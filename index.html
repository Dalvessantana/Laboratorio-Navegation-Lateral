<!DOCTYPE html>
<html lang="pt-br">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu lateral</title>
        <link rel="stylesheet" href="style/style.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
        <div class="main-box">

                <input type="checkbox" id="check">

                <div class="btn-one">

                        <label for="check">
                                <i class='bx bx-menu' ></i>
                        </label>
                </div>


                <div class="sidebar-menu">

                        <div class="logo">

                                <a href="#">Laboratorio</a>
                        </div>
                        <div class="btn-two">
                                <label for="check">
                                      <i class='bx bx-x' ></i>  
                                </label>
                        </div>

                        <div class="menu-lateral">

                                <ul>
                                        <li><a href="#"><i class='bx bx-qr-scan'></i>
                                                        Paínel</a></li>

                                        <li><a href="#"> <i class='bx bx-link'></i>
                                                        Atalhos</a></li>

                                        <li><a href="#"> <i class='bx bx-list-ul'></i>
                                                        Visões gerais</a></li>

                                        <li><a href="#"> <i class='bx bx-calendar-event'></i>
                                                        Eventos</a></li>

                                        <li><a href="#"> <i class='bx bx-server'></i>
                                                        Serviços</a></li>

                                        <li><a href="#"><i class='bx bx-question-mark'></i>
                                                        Sobre</a></li>

                                        <li><a href="#"> <i class='bx bxs-phone-call'></i>
                                                        Contatos</a></li>

                                        <li><a href="#"> <i class='bx bx-chat'></i>
                                                        Feedback</a></li>
                                </ul>
                        </div>
                </div>

                <div class="social-media">

                        <a href="#"><i class="bx bxl-facebook"></i></a>

                        <a href="#"><i class="bx bxl-twitter"></i></a>

                        <a href="#"><i class='bx bxl-instagram'></i></a>

                        <a href="#"><i class='bx bxl-youtube'></i></a>
                </div>
        </div>



</body>

</html>
